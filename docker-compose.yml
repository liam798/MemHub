services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: memhub
    ports:
      - "5532:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memhub"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - memhub_pg_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/memhub
      ALLOWED_ORIGINS: http://localhost:3100
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "18000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3100:80"
    restart: unless-stopped

  mission-control:
    build:
      context: ./mission-control
      dockerfile: Dockerfile
    env_file:
      - path: ./mission-control/.env
        required: false
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/mission-control.db
      WORKSPACE_BASE_PATH: /app/workspace
      PROJECTS_PATH: /app/workspace/projects
      OPENCLAW_GATEWAY_URL: ws://host.docker.internal:18789
    ports:
      - "4000:4000"
    volumes:
      - mission_control_data:/app/data
      - mission_control_workspace:/app/workspace
    restart: unless-stopped

volumes:
  memhub_pg_data:
  mission_control_data:
  mission_control_workspace:
